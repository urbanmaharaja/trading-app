<!DOCTYPE html>
<html>
<head>
<title>Trading Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:20px; background:#f0f0f0; }

.container {
  max-width:950px;
  margin:auto;
  background:white;
  padding:15px;
  border:2px solid #000;
}

.tabs { display:flex; gap:10px; }
.tab-btn { flex:1; padding:12px; background:#ccc; font-weight:bold; }
.active { background:#000; color:white; }

input, select, button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:2px solid #000;
}

.filters { display:flex; gap:10px; flex-wrap:wrap; }

.cardBox {
  flex:1;
  min-width:120px;
  border:2px solid #000;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.profit { color:green; }
.loss { color:red; }

.tableWrapper { overflow:auto; max-height:400px; }

table { width:100%; border-collapse:collapse; }

th, td {
  border:2px solid #000;
  padding:8px;
  text-align:center;
}

thead th {
  position:sticky;
  top:0;
  background:#ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showForm()">Add Trade</button>
<button class="tab-btn" onclick="showDashboard()">Dashboard</button>
</div>

<div id="form">

<select id="account">
<option>Zerodha</option>
<option>Groww</option>
<option>Kotak</option>
</select>

<input id="stockName" placeholder="Stock Name">
<input id="symbol" placeholder="Symbol">

<input type="date" id="buyDate">
<input id="buyQty" placeholder="Buy Qty">
<input id="buyPrice" placeholder="Buy Price">

<input type="date" id="sellDate">
<input id="sellQty" placeholder="Sell Qty">
<input id="sellPrice" placeholder="Sell Price">

<button onclick="save()">Save</button>

</div>

<div id="dashboard" style="display:none;">

<div class="filters">

<select id="filter" onchange="load()">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
<option value="profit">Profit</option>
<option value="loss">Loss</option>
</select>

<select id="accountFilter" onchange="load()">
<option value="all">All Accounts</option>
<option value="Zerodha">Zerodha</option>
<option value="Groww">Groww</option>
<option value="Kotak">Kotak</option>
</select>

</div>

<button onclick="sendWhatsApp()">Send WhatsApp Summary</button>

<div style="display:flex; gap:10px; flex-wrap:wrap;">

<div class="cardBox">Invested<div id="totalInvested">₹0</div></div>
<div class="cardBox">Profit<div id="totalProfit" class="profit">₹0</div></div>
<div class="cardBox">Loss<div id="totalLoss" class="loss">₹0</div></div>
<div class="cardBox">Win %<div id="winRate">0%</div></div>

</div>

<div class="tableWrapper">
<table>
<thead>
<tr>
<th>Account</th>
<th>Stock</th>
<th>Buy Date</th>
<th>Buy Qty</th>
<th>Buy Price</th>
<th>Invested</th>
<th>Sell Date</th>
<th>Sell Qty</th>
<th>Sell Price</th>
<th>Sell Amount</th>
<th>P&L</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxgLr2gCuUVcAlk7dNhLVAceS17AoYE2-7NVohvTATZqamOiLB98pAwM3bBTnq3IovB/exec";

// DATE FORMAT FIX
function formatDate(val){
  let d = new Date(val);
  if(isNaN(d)) return "";
  return d.toLocaleDateString("en-GB");
}

function showForm(){
  form.style.display="block";
  dashboard.style.display="none";
}

function showDashboard(){
  form.style.display="none";
  dashboard.style.display="block";
  load();
}

// ORIGINAL SAVE (WORKING)
function save(){

let data = {
  account:account.value,
  stockName:stockName.value,
  symbol:symbol.value,
  buyDate:buyDate.value,
  buyQty:buyQty.value,
  buyPrice:buyPrice.value,
  sellDate:sellDate.value,
  sellQty:sellQty.value,
  sellPrice:sellPrice.value
};

fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/x-www-form-urlencoded"},
  body:"data="+encodeURIComponent(JSON.stringify(data))
})
.then(()=>alert("Saved"));

}

// DASHBOARD
function load(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";
let totalInvested=0;
let totalProfit=0;
let totalLoss=0;
let wins=0;
let trades=0;

let filterType = filter.value;
let acc = accountFilter.value;
let now = new Date();

data.reverse();

data.forEach(row=>{

let buyQty = Number(row[5]) || 0;
let buyPrice = Number(row[6]) || 0;
let sellQty = Number(row[9]) || 0;
let sellPrice = Number(row[10]) || 0;

if(!buyQty || !buyPrice) return;

let invested = buyQty * buyPrice;
let sellAmount = sellQty * sellPrice;
let pnl = (sellQty && sellPrice) ? (sellAmount - invested) : 0;

let accountVal = row[1];
let date = new Date(row[4]);

let match=true;

if(filterType==="today") match = date.toDateString()===now.toDateString();
if(filterType==="week") match = (now-date)/(1000*60*60*24)<=7;
if(filterType==="month") match = date.getMonth()===now.getMonth();
if(filterType==="profit") match = pnl>0;
if(filterType==="loss") match = pnl<0;

if(acc!=="all" && acc!==accountVal) match=false;

if(!match) return;

totalInvested += invested;

if(pnl > 0){ totalProfit += pnl; wins++; }
if(pnl < 0){ totalLoss += pnl; }

if(pnl !== 0) trades++;

let pnlClass = pnl>=0 ? "profit":"loss";

html += `<tr>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${formatDate(row[4])}</td>
<td>${Math.round(buyQty)}</td>
<td>${buyPrice}</td>
<td>${Math.round(invested)}</td>
<td>${formatDate(row[8])}</td>
<td>${Math.round(sellQty)}</td>
<td>${sellPrice}</td>
<td>${Math.round(sellAmount)}</td>
<td class="${pnlClass}">${Math.round(pnl)}</td>
</tr>`;

});

let winRate = trades ? ((wins/trades)*100).toFixed(1) : 0;

totalInvested.innerText = "₹"+Math.round(totalInvested);
totalProfit.innerText = "₹"+Math.round(totalProfit);
totalLoss.innerText = "₹"+Math.round(totalLoss);
winRate.innerText = winRate+"%";

rows.innerHTML = html;

});

}

function sendWhatsApp(){
window.open("https://wa.me/?text=Trading Summary");
}

</script>

</body>
</html>
