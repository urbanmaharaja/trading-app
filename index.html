<!DOCTYPE html>
<html>
<head>
  <title>Trading Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
      margin:0;
      background:#f4f6f9;
    }

    h2 {
      text-align:center;
      padding:15px;
      margin:0;
      background:#0d6efd;
      color:white;
    }

    .container {
      max-width:900px;
      margin:auto;
      padding:15px;
    }

    .tabs {
      display:flex;
      gap:10px;
      margin-bottom:15px;
    }

    .tab-btn {
      flex:1;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#e9ecef;
      font-weight:600;
    }

    .active {
      background:#0d6efd;
      color:white;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
      margin-bottom:15px;
    }

    input, select {
      width:100%;
      padding:10px;
      margin:6px 0;
      border-radius:8px;
      border:1px solid #ddd;
    }

    button {
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#0d6efd;
      color:white;
      font-weight:bold;
      margin-top:10px;
    }

    .summary {
      font-size:18px;
      font-weight:bold;
      margin-bottom:10px;
    }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:13px;
    }

    th, td {
      padding:8px;
      border-bottom:1px solid #eee;
      text-align:center;
    }

    th {
      background:#f1f3f5;
    }

    .profit { color:green; font-weight:bold; }
    .loss { color:red; font-weight:bold; }
  </style>
</head>

<body>

<h2>Trading Tracker</h2>

<div class="container">

<div class="tabs">
  <button id="tabForm" class="tab-btn active" onclick="showForm()">Add Trade</button>
  <button id="tabDash" class="tab-btn" onclick="showDashboard()">Dashboard</button>
</div>

<!-- FORM -->
<div id="form" class="card">

<select id="account">
<option>Zerodha</option>
<option>Groww</option>
<option>Kotak</option>
</select>

<input id="stockName" placeholder="Stock Name">
<input id="symbol" placeholder="Symbol">

<label>Buy Date</label>
<input type="date" id="buyDate">

<input id="buyQty" placeholder="Buy Quantity">
<input id="buyPrice" placeholder="Buy Price">

<label>Sell Date</label>
<input type="date" id="sellDate">

<input id="sellQty" placeholder="Sell Quantity">
<input id="sellPrice" placeholder="Sell Price">

<button onclick="save()">Save Trade</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card" style="display:none;">

<select id="filter" onchange="load()">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
<option value="profit">Profit</option>
<option value="loss">Loss</option>
</select>

<button onclick="sendWhatsApp()">WhatsApp Summary</button>

<div id="total" class="summary"></div>

<table>
<thead>
<tr>
<th>Stock</th>
<th>Buy</th>
<th>Sell</th>
<th>P&L</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

</div>

</div>

<script>

// API
const API = "PASTE_YOUR_WORKING_URL_HERE";

let filteredData = [];

// Default date
let today = new Date().toISOString().split("T")[0];
buyDate.value = today;
sellDate.value = today;

// Auto symbol
stockName.oninput = () => symbol.value = "NSE:"+stockName.value.toUpperCase();
symbol.oninput = () => stockName.value = symbol.value.replace("NSE:","");

// Tabs
function showForm(){
  form.style.display="block";
  dashboard.style.display="none";
  tabForm.classList.add("active");
  tabDash.classList.remove("active");
}

function showDashboard(){
  form.style.display="none";
  dashboard.style.display="block";
  tabForm.classList.remove("active");
  tabDash.classList.add("active");
  load();
}

// Save
function save(){

let bQty = Number(buyQty.value);
let bPrice = Number(buyPrice.value);
let sQty = Number(sellQty.value);
let sPrice = Number(sellPrice.value);

if(!bQty || !bPrice || !sQty || !sPrice){
  alert("Fill all fields");
  return;
}

let invested = bQty * bPrice;
let sellAmount = sQty * sPrice;
let net = sellAmount - invested;

let data = {
  month:new Date(buyDate.value).toLocaleString('default',{month:'short'}),
  account:account.value,
  stockName:stockName.value,
  symbol:symbol.value,
  buyDate:buyDate.value,
  buyQty:bQty,
  buyPrice:bPrice,
  invested,
  sellDate:sellDate.value,
  sellQty:sQty,
  sellPrice:sPrice,
  sellAmount,
  net,
  difference:sPrice-bPrice,
  days:1,
  percent:(net/invested)*100
};

fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/x-www-form-urlencoded"},
  body:"data="+encodeURIComponent(JSON.stringify(data))
})
.then(res=>res.text())
.then(res=>{
  if(res.toLowerCase().includes("ok")){
    alert("Saved ✅");
    document.querySelectorAll("input").forEach(i=>{
      if(i.type!=="date") i.value="";
    });
    buyDate.value = today;
    sellDate.value = today;
  }
});

}

// Dashboard
function load(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let totalVal = 0;
let html = "";
filteredData = [];

let filterType = filter.value;
let now = new Date();

data.reverse();

data.forEach(row=>{

let date = new Date(row[4]);
let pnl = Number(row[12]||0);

let match = true;

if(filterType==="today"){
  match = date.toDateString() === now.toDateString();
}
if(filterType==="week"){
  match = (now-date)/(1000*60*60*24) <= 7;
}
if(filterType==="month"){
  match = date.getMonth()===now.getMonth();
}
if(filterType==="profit"){
  match = pnl > 0;
}
if(filterType==="loss"){
  match = pnl < 0;
}

if(!match) return;

filteredData.push({stock:row[2], pnl});

totalVal += pnl;

let pnlClass = pnl >= 0 ? "profit" : "loss";

html += `<tr>
<td>${row[2]}</td>
<td>${row[6]}</td>
<td>${row[10]}</td>
<td class="${pnlClass}">${pnl}</td>
</tr>`;

});

total.innerText = "Total P&L: ₹" + totalVal;
rows.innerHTML = html;

});

}

// WhatsApp
function sendWhatsApp(){

let text="Trading Summary\n\n";
let total=0;

filteredData.forEach(d=>{
  text+=`${d.stock} ₹${d.pnl}\n`;
  total+=d.pnl;
});

text+=`\nTotal: ₹${total}`;

window.open("https://wa.me/?text="+encodeURIComponent(text));

}

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
