<!DOCTYPE html>
<html>
<head>
<title>Trading Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; padding:20px; background:#f0f0f0; }

.container {
  max-width:950px;
  margin:auto;
  background:white;
  padding:15px;
  border:2px solid #000;
}

.tabs { display:flex; gap:10px; }
.tab-btn { flex:1; padding:12px; background:#ccc; font-weight:bold; }
.active { background:#000; color:white; }

input, select, button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:2px solid #000;
}

.tableWrapper { overflow:auto; max-height:400px; }

table { width:100%; border-collapse:collapse; }

th, td {
  border:2px solid #000;
  padding:8px;
  text-align:center;
}

thead th {
  position:sticky;
  top:0;
  background:#ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button class="tab-btn active" onclick="showForm()">Add Trade</button>
<button class="tab-btn" onclick="showDashboard()">Dashboard</button>
</div>

<!-- FORM -->
<div id="form">

<select id="account">
<option>Zerodha</option>
<option>Groww</option>
<option>Kotak</option>
</select>

<input id="stockName" placeholder="Stock Name">
<input id="symbol" placeholder="Symbol">

<input type="date" id="buyDate">
<input id="buyQty" placeholder="Buy Qty">
<input id="buyPrice" placeholder="Buy Price">

<input type="date" id="sellDate">
<input id="sellQty" placeholder="Sell Qty">
<input id="sellPrice" placeholder="Sell Price">

<button onclick="save()">Save</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="tableWrapper">
<table>
<thead>
<tr>
<th>Account</th>
<th>Stock</th>
<th>Buy Date</th>
<th>Buy Qty</th>
<th>Buy Price</th>
<th>Invested</th>
<th>Sell Date</th>
<th>Sell Qty</th>
<th>Sell Price</th>
<th>Sell Amount</th>
<th>P&L</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxgLr2gCuUVcAlk7dNhLVAceS17AoYE2-7NVohvTATZqamOiLB98pAwM3bBTnq3IovB/exec";

// DATE FORMAT
function formatDate(val){
  let d = new Date(val);
  if(isNaN(d)) return "";
  return d.toLocaleDateString("en-GB");
}

// SWITCH TABS
function showForm(){
  form.style.display="block";
  dashboard.style.display="none";
}

function showDashboard(){
  form.style.display="none";
  dashboard.style.display="block";
  load();
}

// ✅ SAVE (FULL DATA FIXED)
function save(){

let data = {
  month: new Date().toLocaleString('en-US',{month:'short'}),
  account: account.value,
  stockName: stockName.value,
  symbol: symbol.value,
  buyDate: buyDate.value,
  buyQty: Number(buyQty.value),
  buyPrice: Number(buyPrice.value),
  invested: Number(buyQty.value) * Number(buyPrice.value),
  sellDate: sellDate.value,
  sellQty: Number(sellQty.value),
  sellPrice: Number(sellPrice.value),
  sellAmount: Number(sellQty.value) * Number(sellPrice.value),
  net: (Number(sellQty.value) * Number(sellPrice.value)) - (Number(buyQty.value) * Number(buyPrice.value))
};

fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/x-www-form-urlencoded"},
  body:"data="+encodeURIComponent(JSON.stringify(data))
})
.then(res=>res.text())
.then(()=>{

  alert("Saved ✅");

  // ✅ CLEAR FORM AFTER OK
  stockName.value="";
  symbol.value="";
  buyQty.value="";
  buyPrice.value="";
  sellQty.value="";
  sellPrice.value="";
  
});

}

// ✅ LOAD DASHBOARD (SIMPLE + CORRECT)
function load(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";

data.reverse();

data.forEach(row=>{

let buyQty = Number(row[5]) || 0;
let buyPrice = Number(row[6]) || 0;
let sellQty = Number(row[9]) || 0;
let sellPrice = Number(row[10]) || 0;

let invested = buyQty * buyPrice;
let sellAmount = sellQty * sellPrice;
let pnl = sellAmount - invested;

let pnlClass = pnl >= 0 ? "color:green" : "color:red";

html += `<tr>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${formatDate(row[4])}</td>
<td>${Math.round(buyQty)}</td>
<td>${buyPrice}</td>
<td>${Math.round(invested)}</td>
<td>${formatDate(row[8])}</td>
<td>${Math.round(sellQty)}</td>
<td>${sellPrice}</td>
<td>${Math.round(sellAmount)}</td>
<td style="${pnlClass}">${Math.round(pnl)}</td>
</tr>`;

});

rows.innerHTML = html;

});

}

</script>

</body>
</html>
