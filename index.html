<!DOCTYPE html>
<html>
<head>
  <title>Trading Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding:20px; background:#f0f0f0; }

    .container {
      max-width:950px;
      margin:auto;
      background:white;
      padding:15px;
      border:2px solid #000;
      border-radius:10px;
    }

    input, select, button {
      width:100%;
      padding:12px;
      margin:6px 0;
      border:2px solid #000;
      font-size:16px;
    }

    .tabs { display:flex; gap:10px; }
    .tab-btn { flex:1; padding:12px; background:#ccc; font-weight:bold; }
    .active { background:#000; color:white; }

    .filters { display:flex; gap:10px; flex-wrap:wrap; }

    .cardBox {
      flex:1;
      min-width:140px;
      border:2px solid #000;
      padding:10px;
      text-align:center;
      font-weight:bold;
      background:#fafafa;
    }

    .profit { color:green; font-weight:bold; }
    .loss { color:red; font-weight:bold; }

    .tableWrapper {
      overflow:auto;
      max-height:400px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th, td {
      border:2px solid #000;
      padding:8px;
      text-align:center;
      white-space:nowrap;
    }

    thead th {
      position:sticky;
      top:0;
      background:#ddd;
      z-index:2;
    }

  </style>
</head>

<body>

<div class="container">

<div class="tabs">
  <button id="tabForm" class="tab-btn active" onclick="showForm()">Add Trade</button>
  <button id="tabDash" class="tab-btn" onclick="showDashboard()">Dashboard</button>
</div>

<div id="form">

<select id="account">
<option>Zerodha</option>
<option>Groww</option>
<option>Kotak</option>
</select>

<input id="stockName" placeholder="Stock Name">
<input id="symbol" placeholder="Symbol">

<input type="date" id="buyDate">
<input id="buyQty" placeholder="Buy Qty">
<input id="buyPrice" placeholder="Buy Price">

<input type="date" id="sellDate">
<input id="sellQty" placeholder="Sell Qty">
<input id="sellPrice" placeholder="Sell Price">

<button onclick="save()">Save</button>

</div>

<div id="dashboard" style="display:none;">

<div class="filters">

<select id="filter" onchange="load()">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
<option value="profit">Profit</option>
<option value="loss">Loss</option>
<option value="open">Current Position</option>
</select>

<select id="accountFilter" onchange="load()">
<option value="all">All Accounts</option>
<option value="Zerodha">Zerodha</option>
<option value="Groww">Groww</option>
<option value="Kotak">Kotak</option>
</select>

</div>

<button onclick="sendWhatsApp()">Send WhatsApp Summary</button>

<!-- SUMMARY -->
<div style="display:flex; gap:10px; flex-wrap:wrap;">

<div class="cardBox">
Total Invested
<div id="totalInvested">₹0</div>
</div>

<div class="cardBox">
Profit
<div id="totalProfit" class="profit">₹0</div>
</div>

<div class="cardBox">
Loss
<div id="totalLoss" class="loss">₹0</div>
</div>

<div class="cardBox">
Win Rate %
<div id="winRate" class="profit">0%</div>
</div>

</div>

<div class="tableWrapper">
<table>
<thead>
<tr>
<th>Account</th>
<th>Stock</th>
<th>Buy Date</th>
<th>Buy Qty</th>
<th>Buy Price</th>
<th>Invested</th>
<th>Sell Date</th>
<th>Sell Qty</th>
<th>Sell Price</th>
<th>Sell Amount</th>
<th>P&L</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxgLr2gCuUVcAlk7dNhLVAceS17AoYE2-7NVohvTATZqamOiLB98pAwM3bBTnq3IovB/exec";

let today = new Date().toISOString().split("T")[0];
buyDate.value = today;
sellDate.value = today;

function showForm(){
  form.style.display="block";
  dashboard.style.display="none";
}

function showDashboard(){
  form.style.display="none";
  dashboard.style.display="block";
  load();
}

function save(){

let bQty = Number(buyQty.value);
let bPrice = Number(buyPrice.value);
let sQty = Number(sellQty.value);
let sPrice = Number(sellPrice.value);

let invested = bQty*bPrice;
let sellAmount = sQty*sPrice;
let net = sellAmount - invested;

let data = {
  month:"Mar",
  account:account.value,
  stockName:stockName.value,
  symbol:symbol.value,
  buyDate:buyDate.value,
  buyQty:bQty,
  buyPrice:bPrice,
  invested,
  sellDate:sellDate.value,
  sellQty:sQty,
  sellPrice:sPrice,
  sellAmount,
  net
};

fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/x-www-form-urlencoded"},
  body:"data="+encodeURIComponent(JSON.stringify(data))
}).then(()=>alert("Saved"));

}

function load(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let html="";
let totalInvestedVal=0;
let totalProfit=0;
let totalLoss=0;
let wins=0;
let totalTrades=0;

let filterType = filter.value;
let acc = accountFilter.value;
let now = new Date();

data.reverse();

data.forEach(row=>{

let buyQty = Number(row[5] || 0);
let buyPrice = Number(row[6] || 0);
let sellQty = Number(row[9] || 0);
let sellPrice = Number(row[10] || 0);

let invested = buyQty * buyPrice;
let sellAmount = sellQty * sellPrice;
let pnl = sellAmount - invested;

let accountVal = row[1];
let date = new Date(row[4]);

let match=true;

if(filterType==="today") match = date.toDateString()===now.toDateString();
if(filterType==="week") match = (now-date)/(1000*60*60*24)<=7;
if(filterType==="month") match = date.getMonth()===now.getMonth();
if(filterType==="profit") match = pnl>0;
if(filterType==="loss") match = pnl<0;

if(acc!=="all" && acc!==accountVal) match=false;

if(!match) return;

totalInvestedVal += invested;

if(pnl > 0){ totalProfit += pnl; wins++; }
if(pnl < 0){ totalLoss += pnl; }

totalTrades++;

let pnlClass = pnl>=0 ? "profit":"loss";

html += `<tr>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[4]}</td>
<td>${row[5]}</td>
<td>${row[6]}</td>
<td>${invested}</td>
<td>${row[8]}</td>
<td>${row[9]}</td>
<td>${row[10]}</td>
<td>${sellAmount}</td>
<td class="${pnlClass}">${pnl}</td>
</tr>`;

});

let winRateVal = totalTrades ? ((wins/totalTrades)*100).toFixed(1) : 0;

totalInvested.innerText = "₹"+totalInvestedVal.toFixed(0);
totalProfit.innerText = "₹"+totalProfit.toFixed(0);
totalLoss.innerText = "₹"+totalLoss.toFixed(0);
winRate.innerText = winRateVal + "%";

rows.innerHTML = html;

});

}

function sendWhatsApp(){
window.open("https://wa.me/?text=Trading Summary");
}

</script>

</body>
</html>
