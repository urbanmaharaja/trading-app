<!DOCTYPE html>
<html>
<head>
  <title>Trading Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { 
      font-family: Arial; 
      padding:20px; 
      background:#f0f0f0; 
      color:#000;
    }

    h2 { text-align:center; }

    .container {
      max-width:950px;
      margin:auto;
      background:white;
      padding:15px;
      border-radius:10px;
      border:2px solid #000;
    }

    input, select, button {
      width:100%;
      padding:12px;
      margin:6px 0;
      font-size:16px;
      border:2px solid #000;
      border-radius:6px;
    }

    .tabs { display:flex; gap:10px; }
    .tab-btn { flex:1; padding:12px; background:#ccc; font-weight:bold; }
    .active { background:#000; color:white; }

    .filters { display:flex; gap:10px; flex-wrap:wrap; }

    .cardBox {
      flex:1;
      min-width:140px;
      border:2px solid #000;
      padding:10px;
      text-align:center;
      font-weight:bold;
      background:#fafafa;
    }

    .profit { color:green; font-weight:bold; }
    .loss { color:red; font-weight:bold; }

    .tableWrapper { overflow-x:auto; }

    table {
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    th, td {
      border:2px solid #000;
      padding:8px;
      text-align:center;
      white-space:nowrap;
    }

    th { background:#ddd; }

    /* 🧊 FREEZE FIRST COLUMN */
    th:first-child, td:first-child {
      position:sticky;
      left:0;
      background:white;
      z-index:2;
    }

    /* 👁️ BIG FONT MODE */
    .big {
      font-size:20px;
    }

  </style>
</head>

<body>

<h2>Trading Tracker</h2>

<div class="container">

<div class="tabs">
  <button id="tabForm" class="tab-btn active" onclick="showForm()">Add Trade</button>
  <button id="tabDash" class="tab-btn" onclick="showDashboard()">Dashboard</button>
</div>

<!-- FORM -->
<div id="form">

<select id="account">
<option>Zerodha</option>
<option>Groww</option>
<option>Kotak</option>
</select>

<input id="stockName" placeholder="Stock Name">
<input id="symbol" placeholder="Symbol">

<label>Buy Date</label>
<input type="date" id="buyDate">

<input id="buyQty" placeholder="Buy Quantity">
<input id="buyPrice" placeholder="Buy Price">

<label>Sell Date</label>
<input type="date" id="sellDate">

<input id="sellQty" placeholder="Sell Quantity">
<input id="sellPrice" placeholder="Sell Price">

<button onclick="save()">Save Trade</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<div class="filters">

<select id="filter" onchange="load()">
<option value="all">All</option>
<option value="today">Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
<option value="profit">Profit</option>
<option value="loss">Loss</option>
<option value="open">Current Position</option> <!-- NEW -->
</select>

<select id="accountFilter" onchange="load()">
<option value="all">All Accounts</option>
<option value="Zerodha">Zerodha</option>
<option value="Groww">Groww</option>
<option value="Kotak">Kotak</option>
</select>

<button onclick="toggleFont()">Big Font</button>

</div>

<button onclick="sendWhatsApp()">Send WhatsApp Summary</button>

<!-- SUMMARY -->
<div id="summary" style="display:flex; gap:10px; flex-wrap:wrap;">

  <div class="cardBox">
    Total Invested
    <div id="totalInvested">₹0</div>
  </div>

  <div class="cardBox">
    Total P&L
    <div id="totalPNL">₹0</div>
  </div>

  <div class="cardBox">
    Profit
    <div id="totalProfit" class="profit">₹0</div>
  </div>

  <div class="cardBox">
    Loss
    <div id="totalLoss" class="loss">₹0</div>
  </div>

</div>

<div class="tableWrapper">
<table>
<thead>
<tr>
<th>Stock</th>
<th>Buy Date</th>
<th>Buy Qty</th>
<th>Buy Price</th>
<th>Invested</th>
<th>Sell Date</th>
<th>Sell Qty</th>
<th>Sell Price</th>
<th>Sell Amount</th>
<th>P&L</th>
<th>Diff</th>
<th>Days</th>
<th>%</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>
</div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxgLr2gCuUVcAlk7dNhLVAceS17AoYE2-7NVohvTATZqamOiLB98pAwM3bBTnq3IovB/exec";

let filteredData = [];

let today = new Date().toISOString().split("T")[0];
buyDate.value = today;
sellDate.value = today;

stockName.oninput = () => symbol.value = "NSE:"+stockName.value.toUpperCase();
symbol.oninput = () => stockName.value = symbol.value.replace("NSE:","");

function showForm(){
  form.style.display="block";
  dashboard.style.display="none";
  tabForm.classList.add("active");
  tabDash.classList.remove("active");
}

function showDashboard(){
  form.style.display="none";
  dashboard.style.display="block";
  tabForm.classList.remove("active");
  tabDash.classList.add("active");
  load();
}

function toggleFont(){
  document.body.classList.toggle("big");
}

function save(){

let bQty = Number(buyQty.value);
let bPrice = Number(buyPrice.value);
let sQty = Number(sellQty.value);
let sPrice = Number(sellPrice.value);

if(!bQty || !bPrice || !sQty || !sPrice){
  alert("Fill all fields");
  return;
}

let invested = bQty * bPrice;
let sellAmount = sQty * sPrice;
let net = sellAmount - invested;

let data = {
  month:new Date(buyDate.value).toLocaleString('default',{month:'short'}),
  account:account.value,
  stockName:stockName.value,
  symbol:symbol.value,
  buyDate:buyDate.value,
  buyQty:bQty,
  buyPrice:bPrice,
  invested,
  sellDate:sellDate.value,
  sellQty:sQty,
  sellPrice:sPrice,
  sellAmount,
  net,
  difference:sPrice-bPrice,
  days:1,
  percent:(net/invested)*100
};

fetch(API,{
  method:"POST",
  headers:{"Content-Type":"application/x-www-form-urlencoded"},
  body:"data="+encodeURIComponent(JSON.stringify(data))
})
.then(res=>res.text())
.then(res=>{
  if(res.toLowerCase().includes("ok")){
    alert("Saved ✅");
    document.querySelectorAll("input").forEach(i=>{
      if(i.type!=="date") i.value="";
    });
    buyDate.value = today;
    sellDate.value = today;
  }
});

}

function formatDate(d){
  return new Date(d).toLocaleDateString("en-GB");
}

function load(){

fetch(API)
.then(res=>res.json())
.then(data=>{

let totalVal=0, totalInvested=0, totalProfit=0, totalLoss=0;
let html="";
filteredData=[];

let filterType = filter.value;
let accountType = accountFilter.value;
let now = new Date();

data.reverse();

data.forEach(row=>{

let date = new Date(row[4]);
let pnl = Number(row[12]||0);
let account = row[1];
let buyQty = Number(row[5]||0);
let sellQty = Number(row[9]||0);

let match=true;

// filters
if(filterType==="today") match = date.toDateString()===now.toDateString();
if(filterType==="week") match = (now-date)/(1000*60*60*24)<=7;
if(filterType==="month") match = date.getMonth()===now.getMonth();
if(filterType==="profit") match = pnl>0;
if(filterType==="loss") match = pnl<0;

// ✅ CURRENT POSITION
if(filterType==="open") match = buyQty > sellQty;

// account
if(accountType!=="all" && account!==accountType) match=false;

if(!match) return;

let invested = Number(row[7]||0);

totalInvested += invested;
totalVal += pnl;
if(pnl>0) totalProfit+=pnl;
if(pnl<0) totalLoss+=pnl;

filteredData.push({stock:row[2], pnl});

let pnlClass = pnl>=0 ? "profit":"loss";

html += `<tr>
<td>${row[2]}</td>
<td>${formatDate(row[4])}</td>
<td>${row[5]}</td>
<td>${row[6]}</td>
<td>${row[7]}</td>
<td>${formatDate(row[8])}</td>
<td>${row[9]}</td>
<td>${row[10]}</td>
<td>${row[11]}</td>
<td class="${pnlClass}">${pnl}</td>
<td>${row[13]}</td>
<td>${row[14]}</td>
<td>${row[15]}</td>
</tr>`;

});

totalPNL.innerText = "₹"+totalVal;
totalInvested.innerText = "₹"+totalInvested;
totalProfit.innerText = "₹"+totalProfit;
totalLoss.innerText = "₹"+totalLoss;

rows.innerHTML = html;

});

}

function sendWhatsApp(){
let text="Trading Summary\n\n", total=0;
filteredData.forEach(d=>{ text+=`${d.stock} ₹${d.pnl}\n`; total+=d.pnl; });
text+=`\nTotal: ₹${total}`;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

</script>

</body>
</html>
